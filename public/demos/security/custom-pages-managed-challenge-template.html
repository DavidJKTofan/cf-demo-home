<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <title>Just a moment...</title>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        :root {
            --primary-color-light: #0051c3;
            --primary-color-dark: #fff;
            --bg-light: #fff;
            --bg-dark: #222;
            --text-light: #313131;
            --text-dark: #d9d9d9;
            --accent-light: #ee730a;
            --accent-dark: #ee730a;
            --border-light: #003681;
            --border-dark: #4693ff;
        }

        @keyframes lds-ring {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            line-height: 1.15;
            -webkit-text-size-adjust: 100%;
            color: var(--text-light);
        }

        body,
        button,
        html {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        body.no-js .loading-spinner {
            visibility: hidden;
        }

        body.no-js .challenge-running {
            display: none;
        }

        a {
            color: var(--primary-color-light);
            text-decoration: none;
            transition: color 150ms ease;
        }

        a:hover {
            color: var(--accent-light);
            text-decoration: underline;
        }

        /* Dark mode adjustments */
        body.dark {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        body.dark a {
            color: var(--primary-color-dark);
        }

        body.dark a:hover {
            color: var(--accent-dark);
        }

        body.dark .big-button,
        body.dark .pow-button {
            background-color: var(--border-dark);
            color: #1d1d1d;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            flex-direction: column;
            align-items: center;
            padding: 0 1.5rem;
        }

        .main-content {
            margin: 8rem auto;
            width: 100%;
            max-width: 60rem;
        }

        .h1 {
            font-size: 2.5rem;
            font-weight: 500;
            line-height: 3.75rem;
            margin-bottom: 1rem;
        }

        .h2 {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 2.25rem;
            margin-bottom: 1rem;
        }

        .body-text,
        .core-msg {
            font-size: 1rem;
            line-height: 1.25rem;
            font-weight: 400;
            margin-bottom: 1rem;
        }

        .footer {
            margin: 2rem auto 0;
            width: 100%;
            max-width: 60rem;
            font-size: 0.75rem;
            line-height: 1.125rem;
        }

        .footer-inner {
            border-top: 1px solid #d9d9d9;
            padding: 1rem 0;
            text-align: center;
        }

        .client-info {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        .loading-spinner {
            height: 76px;
            text-align: center;
            margin-bottom: 1rem;
        }

        .lds-ring,
        .lds-ring div {
            display: inline-block;
            position: relative;
            width: 1.875rem;
            height: 1.875rem;
        }

        .lds-ring div {
            box-sizing: border-box;
            border: 0.3rem solid var(--text-light);
            border-radius: 50%;
            border-color: var(--text-light) transparent transparent;
            animation: lds-ring 1.2s cubic-bezier(.5, 0, .5, 1) infinite;
        }

        .lds-ring div:nth-child(1) {
            animation-delay: -0.45s;
        }

        .lds-ring div:nth-child(2) {
            animation-delay: -0.3s;
        }

        .lds-ring div:nth-child(3) {
            animation-delay: -0.15s;
        }

        /* Responsive fix for older IE */
        @media screen and (-ms-high-contrast: active),
        screen and (-ms-high-contrast: none) {

            .main-wrapper,
            body {
                display: block;
            }
        }
    </style>
</head>

<body class="no-js">
    <div class="main-wrapper" role="main">
        <div class="main-content">
            <h1 class="h1">
                <img src="../../favicon.ico" alt="Site Favicon"> Your Brand Here!
            </h1>
            <h2 id="challenge-running" class="h2">
                Checking if the site connection is secure
            </h2>
            <div id="challenge-stage">
                <div id="turnstile-wrapper"></div>
            </div>
            <div id="challenge-body-text" class="body-text">
                automatic-demo.com needs to review the security of your connection before proceeding.
            </div>
            <div class="footer">
                <div class="footer-inner">
                    <div>::CAPTCHA_BOX::</div>
                    <div id="footer-text">
                        Brand provided by <a rel="noopener noreferrer" href="/" target="_blank">Myself</a>
                    </div>
                    <!-- Display Client IP and Ray ID tokens -->
                    <div class="client-info">
                        Your IP: ::CLIENT_IP:: | Ray ID: ::RAY_ID::
                    </div>
                </div>
            </div>
            <noscript>
                <div id="challenge-error-title">
                    <h2 class="h2">
                        <span id="challenge-error-text">Enable JavaScript and cookies to continue</span>
                    </h2>
                </div>
            </noscript>
        </div>
    </div>
</body>

</html>
