<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0051c3">
    <title>{{ DEMO_NAME }} - Cloudflare Demo</title>
    <meta name="description" content="{{ DEMO_DESCRIPTION }}">
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="preload" href="../../css/styles.css" as="style">
  </head>
  <body>
    <header>
      <div class="container">
        <nav aria-label="Main navigation">
          <a href="/" class="home-button" aria-label="Return to homepage">
            <svg class="home-icon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
              <path d="M12 2L1 12h3v9h7v-6h2v6h7v-9h3L12 2z"/>
            </svg>
            <span>Home</span>
          </a>
          <button class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark theme">
            <svg class="sun-icon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
              <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
              <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
            </svg>
          </button>
        </nav>
      </div>
    </header>

    <main class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="/">Home</a></li>
          <li><a href="/demos">Demos</a></li>
          <li aria-current="page">{{ DEMO_NAME }}</li>
        </ol>
      </nav>

      <div class="demo-header">
        <h1>{{ DEMO_NAME }}</h1>
        <div class="demo-meta-tags">
          <span class="demo-category">{{ CATEGORY }}</span>
          <div class="demo-labels">
            {{ LABELS }}
          </div>
        </div>
      </div>

      <div class="demo-actions">
        <a href="{{ DEMO_URL }}" class="btn btn-primary" target="_blank" rel="noopener noreferrer">View Demo</a>
        <a href="/" class="btn">Back to Demos</a>
      </div>

      <div class="image-container">
        <img 
          src="{{ DEMO_IMAGE }}" 
          alt="{{ DEMO_NAME }}"
          loading="lazy"
        >
      </div>

      <div class="code-block">
        <pre><code>{{ CODE }}</code></pre>
        <button class="copy-button" aria-label="Copy code">
          <span class="copy-icon">📋</span>
          <span class="copy-text">Copy</span>
        </button>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2025 automatic-demo.com</p>
        <p class="last-updated">Last Updated: <time datetime="{{ LAST_UPDATED }}">{{ LAST_UPDATED }}</time></p>
      </div>
    </footer>
  </body>
</html>
